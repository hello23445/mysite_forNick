<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Speed Test</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #060039, #1a004d);
        color: #d9d9d9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        gap: 40px;
        align-items: flex-start;
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        padding: 40px 30px;
        border-radius: 30px;
        text-align: center;
        width: 350px;
        box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.02);
    }

    h1 {
        font-size: 2em;
        margin-bottom: 10px;
    }

    .circle-wrapper {
        position: relative;
        width: 220px;
        height: 220px;
        margin: 0 auto 20px;
    }

    .circle-bg, .circle-progress {
        position: absolute;
        top: 0;
        left: 0;
        width: 220px;
        height: 220px;
        border-radius: 50%;
    }

    .circle-bg {
        border: 5px solid rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
    }

    .circle-progress {
        border: 5px solid #d9d9d9;
        clip: rect(0px, 220px, 220px, 110px);
        transform: rotate(0deg);
        transition: transform 0.2s linear;
    }

    .circle-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 220px;
        height: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 2.5em;
        font-weight: bold;
        text-align: center;
    }

    .circle-text {
        font-size: 1.2em;
        font-weight: bold;
        margin-top: 2px;
        opacity: 1;
        transition: opacity 0.5s ease;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0;}
        100% { opacity: 1;}
    }

    .progress-container {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        overflow: hidden;
        margin-top: 20px;
    }

    .progress-bar {
        height: 12px;
        width: 0;
        background-color: #d9d9d9;
        border-radius: 6px;
        transition: width 0.2s linear;
    }

    #connection {
        font-size: 1.5em;
        margin-top: 25px;
        opacity: 0;
        transition: opacity 0.6s ease;
    }

    .tips {
        display: none;
        width: 300px;
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
        font-size: 1em;
    }

    .tips h2 {
        margin-top: 0;
        font-size: 1.3em;
        margin-bottom: 10px;
    }

    .tips ul {
        padding-left: 20px;
    }

    .tips ul li {
        margin-bottom: 8px;
    }

</style>
</head>
<body>
<button 
    onclick="window.location.href = 'main.html'" 
    style="position: absolute; top: 10px; left: 10px; padding: 10px 20px; font-size: 16px;"
>
    BACK TO MAIN MENU
</button>

<div class="container">
    <div class="card">
        <h1 class="circle-text" id="circle-text">Measuring speed...</h1>

        <div class="circle-wrapper">
            <div class="circle-bg"></div>
            <div class="circle-progress" id="circle-progress"></div>
            <div class="circle-content">
                <div id="download">0 Mbps</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="result" id="connection">Connection: —</div>
    </div>

    <div class="tips" id="tips">
        <h2>Tips to Improve Connection</h2>
        <ul>
            <li>Restart your router.</li>
            <li>Connect via Ethernet cable instead of Wi-Fi.</li>
            <li>Close unnecessary programs using the internet.</li>
            <li>Move the router closer to your device.</li>
            <li>Contact your provider to upgrade your plan.</li>
        </ul>
    </div>
</div>

<script>
async function testSpeed() {
    const downloadEl = document.getElementById('download');
    const connectionEl = document.getElementById('connection');
    const progressEl = document.getElementById('progress');
    const circleEl = document.getElementById('circle-progress');
    const tipsEl = document.getElementById('tips');
    const circleText = document.getElementById('circle-text');

    // Downloading file to measure speed
    let fileSizeMB = 5;
    let startTime = performance.now();
    await new Promise(resolve => {
        let img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg?full&cache=" + Math.random();
    });
    let endTime = performance.now();

    let durationSec = (endTime - startTime) / 1000;
    let speedMbps = ((fileSizeMB * 8) / durationSec).toFixed(2);

    // Speed animation + progress
    let current = 0;
    let interval = setInterval(() => {
        if (current < speedMbps) {
            current += Math.max(0.1, speedMbps / 50);
            downloadEl.textContent = current.toFixed(1) + " Mbps";
            progressEl.style.width = Math.min((current / speedMbps) * 100, 100) + "%";
            let deg = Math.min((current / speedMbps) * 360, 360);
            circleEl.style.transform = "rotate(" + deg + "deg)";
        } else {
            downloadEl.textContent = speedMbps + " Mbps";
            progressEl.style.width = "100%";
            circleEl.style.transform = "rotate(360deg)";
            clearInterval(interval);

            // Hide "Measuring speed..." text
            circleText.style.opacity = 0;

            // Show connection quality
            let quality;
            if (speedMbps < 5) quality = "Weak";
            else if (speedMbps < 15) quality = "Average";
            else if (speedMbps < 50) quality = "Normal";
            else quality = "Strong";

            connectionEl.textContent = "Connection: " + quality;
            setTimeout(() => {
                circleText.style.display = "none";
            }, 1000);
            connectionEl.style.opacity = 1;

            // Show tips only for weak connection
            if (speedMbps < 5) {
                tipsEl.style.display = "block";
            }
        }
    }, 20);
}

window.onload = testSpeed;
</script>
</body>
</html>
