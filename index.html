<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Подписка на канал</title>
  <style>
    body {
      background-color: #060039;
      color: #d9d9d9;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
    button {
      background-color: #251897;
      color: #d9d9d9;
      border: none;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    h1 {
      margin-bottom: 30px;
    }
    #log {
      background: #1a1a5a;
      color: #ccc;
      max-height: 150px;
      overflow-y: auto;
      padding: 10px;
      margin-top: 30px;
      border-radius: 8px;
      font-family: monospace;
      text-align: left;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1 id="message">Загрузка...</h1>
  <div id="buttons"></div>

  <div id="log"></div>

  <script>
    const botToken = '6537497957:AAHnaAc1x5qesBdNxOU9gQI27JdHvJ8IOMk';
    const channelUsername = 'Nicknaymes2bot';
    const redirectUrl = 'https://t.me/NickNaymesBot/create';

    const userLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
    const text = {
      ru: {
        mustSub: 'Чтобы пользоваться этим мини-приложением, надо подписаться на канал',
        check: 'Проверить',
        subscribe: 'Подписаться',
        loading: 'Загрузка...',
        errorCheck: 'Ошибка при проверке подписки',
      },
      en: {
        mustSub: 'To use this mini app, you must subscribe to the channel',
        check: 'Check',
        subscribe: 'Subscribe',
        loading: 'Loading...',
        errorCheck: 'Error checking subscription',
      }
    };

    const messageEl = document.getElementById('message');
    const buttonsEl = document.getElementById('buttons');
    const logEl = document.getElementById('log');

    function log(text) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${text}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function showSubscribeScreen(withRedirect = false) {
      messageEl.textContent = text[userLang].mustSub;
      buttonsEl.innerHTML = '';

      const subBtn = document.createElement('button');
      subBtn.textContent = text[userLang].subscribe;
      subBtn.onclick = () => window.open(`https://t.me/${channelUsername}`, '_blank');
      buttonsEl.appendChild(subBtn);

      const checkBtn = document.createElement('button');
      checkBtn.textContent = text[userLang].check;
      checkBtn.onclick = () => {
        if (withRedirect && startParam) {
          checkSubscription(startParam);
        } else {
          window.location.href = redirectUrl;
        }
      };
      buttonsEl.appendChild(checkBtn);
    }

    async function checkSubscription(id) {
      messageEl.textContent = text[userLang].loading;
      log(`Начинаем проверку подписки пользователя с ID: ${id}`);

      try {
        const response = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=@${channelUsername}&user_id=${id}`);
        const data = await response.json();

        if (!data.ok) {
          log(`Ошибка API Telegram: ${data.description || 'нет описания'}`);
          messageEl.textContent = text[userLang].errorCheck;
          return showSubscribeScreen(true);
        }

        const status = data.result?.status;
        log(`Статус подписки: ${status}`);

        if (['member', 'administrator', 'creator'].includes(status)) {
          log('Пользователь подписан. Перенаправляем...');
          window.location.href = redirectUrl;
        } else {
          log('Пользователь не подписан. Показываем экран подписки.');
          showSubscribeScreen(true);
        }
      } catch (e) {
        log('Ошибка при запросе к Telegram API: ' + e.message);
        messageEl.textContent = text[userLang].errorCheck;
        showSubscribeScreen(true);
      }
    }

    // Получаем параметр start_param из Telegram Mini App
    const startParam = window.Telegram?.WebApp?.initDataUnsafe?.start_param;

    if (startParam) {
      log(`Параметр start_param найден: ${startParam}`);
      checkSubscription(startParam);
    } else {
      log('Параметр start_param отсутствует. Показываем экран подписки без проверки.');
      messageEl.textContent = text[userLang].mustSub;
      showSubscribeScreen(false);
    }
  </script>
</body>
</html>
