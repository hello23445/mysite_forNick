<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Проверка подписки</title>
  <style>
    body { font-family: sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
    #content { background: #fff; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
    button, a { display: block; width: 100%; padding: 0.75rem; margin-top: 1rem; border: none; border-radius: 0.25rem; font-weight: bold; text-decoration: none; }
    #subscribeButton { background: #3b82f6; color: white; }
    #checkButton { background: #10b981; color: white; }
    #errorMessage { color: #ef4444; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div id="content">
    <p id="message"></p>
    <a id="subscribeButton" href="https://t.me/Nicknaymes2bot"></a>
    <button id="checkButton"></button>
    <p id="errorMessage"></p>
  </div>

  <script>
    const texts = {
      ru: {
        notSubscribed: "Чтобы пользоваться этим мини-приложением, подпишитесь на канал",
        subscribe: "Подписаться",
        check: "Проверить подписку",
        loading: "Проверка подписки...",
        error: "Ошибка при проверке. Начните чат с ботом и попробуйте снова."
      },
      en: {
        notSubscribed: "To use this mini-app, you must subscribe to the channel",
        subscribe: "Subscribe",
        check: "Check subscription",
        loading: "Checking subscription...",
        error: "Error checking. Please start chat with bot and try again."
      }
    };

    const userLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
    const lang = texts[userLang];

    const messageElement = document.getElementById('message');
    const subscribeButton = document.getElementById('subscribeButton');
    const checkButton = document.getElementById('checkButton');
    const errorMessageElement = document.getElementById('errorMessage');

    const botToken = 'ВАШ_ТОКЕН_БОТА'; // ← ЗАМЕНИ на свой токен
    const channelId = '@NickNaymesChannel'; // ← или '-100xxxxxxxxxx' (если приватный)

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('startapp');
    console.log('[userId]:', userId);

    async function checkSubscription(userId) {
      try {
        messageElement.textContent = lang.loading;
        errorMessageElement.style.display = 'none';

        const res = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=${channelId}&user_id=${userId}`);
        const data = await res.json();
        console.log('[API response]:', data);

        if (!data.ok) {
          if (data.description.includes('user not found')) {
            errorMessageElement.textContent = lang.error;
          } else {
            errorMessageElement.textContent = data.description;
          }
          errorMessageElement.style.display = 'block';
          messageElement.textContent = lang.notSubscribed;
          return;
        }

        const status = data.result.status;
        if (['member', 'administrator', 'creator'].includes(status)) {
          window.location.href = 'https://t.me/NickNaymesBot/create';
        } else {
          messageElement.textContent = lang.notSubscribed;
        }
      } catch (err) {
        console.error('Fetch error:', err);
        messageElement.textContent = lang.notSubscribed;
        errorMessageElement.textContent = lang.error;
        errorMessageElement.style.display = 'block';
      }
    }

    checkButton.addEventListener('click', () => {
      if (userId) {
        checkSubscription(userId);
      } else {
        window.location.href = 'https://t.me/NickNaymesBot/create';
      }
    });

    // Первичная отрисовка
    if (userId) {
      messageElement.textContent = lang.loading;
      checkSubscription(userId);
    } else {
      messageElement.textContent = lang.notSubscribed;
    }

    subscribeButton.textContent = lang.subscribe;
    checkButton.textContent = lang.check;
  </script>
</body>
</html>
