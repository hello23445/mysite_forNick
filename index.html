<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Проверка подписки</title>
  <style>
    body {
      font-family: sans-serif;
      background: #060039;
      color: #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    #container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }
    button, a {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #251897;
      color: #d9d9d9;
      text-decoration: none;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover, a:hover {
      background: #3326b5;
    }
    #error {
      color: #ff7777;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div id="container">
    <p id="text">Загрузка...</p>
    <a id="subscribeBtn" href="https://t.me/Nicknaymes2bot" target="_blank"></a>
    <button id="checkBtn" style="display: none;"></button>
    <p id="error"></p>
  </div>

  <script>
    const botToken = '6537497957:AAHnaAc1x5qesBdNxOU9gQI27JdHvJ8IOMk';
    const channel = '@Nicknaymes2bot';
    const redirectUrl = 'https://t.me/NickNaymesBot/create';

    const lang = navigator.language.startsWith('ru') ? 'ru' : 'en';

    const texts = {
      ru: {
        subscribe: 'Подписаться',
        check: 'Проверить',
        checking: 'Проверка подписки...',
        notSubscribed: 'Чтобы пользоваться этим мини-приложением, надо подписаться на канал',
        error: 'Ошибка при проверке. Убедитесь, что пользователь начал чат с ботом.'
      },
      en: {
        subscribe: 'Subscribe',
        check: 'Check',
        checking: 'Checking subscription...',
        notSubscribed: 'To use this mini-app, you must subscribe to the channel',
        error: 'Error while checking. Make sure the user has started a chat with the bot.'
      }
    };

    const textEl = document.getElementById('text');
    const subscribeBtn = document.getElementById('subscribeBtn');
    const checkBtn = document.getElementById('checkBtn');
    const errorEl = document.getElementById('error');

    const queryParams = new URLSearchParams(window.location.search);
    const targetUserId = queryParams.get('startapp');

    subscribeBtn.textContent = texts[lang].subscribe;
    checkBtn.textContent = texts[lang].check;

    if (!targetUserId) {
      // Нет ID → просто показываем просьбу подписаться
      textEl.textContent = texts[lang].notSubscribed;
      subscribeBtn.style.display = 'block';
    } else {
      // Есть ID → сразу пробуем проверить подписку
      checkBtn.style.display = 'block';
      checkBtn.addEventListener('click', () => checkSub(targetUserId));
      checkSub(targetUserId); // сразу
    }

    async function checkSub(userId) {
      try {
        textEl.textContent = texts[lang].checking;
        errorEl.textContent = '';
        const res = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=${channel}&user_id=${userId}`);
        const data = await res.json();

        if (!data.ok || !data.result) {
          textEl.textContent = texts[lang].notSubscribed;
          errorEl.textContent = texts[lang].error;
          return;
        }

        const status = data.result.status;
        if (['member', 'administrator', 'creator'].includes(status)) {
          window.location.href = redirectUrl;
        } else {
          textEl.textContent = texts[lang].notSubscribed;
        }
      } catch (e) {
        textEl.textContent = texts[lang].notSubscribed;
        errorEl.textContent = texts[lang].error;
      }
    }
  </script>
</body>
</html>
