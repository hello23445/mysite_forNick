<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Проверка подписки</title>
  <style>
    body {
      font-family: sans-serif;
      background: #060039;
      color: #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    #content {
      background: #0d0054;
      padding: 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    button, a {
      display: block;
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      border: none;
      border-radius: 0.25rem;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      background-color: #251897;
      color: #d9d9d9;
      transition: background 0.3s;
    }
    button:hover, a:hover {
      background-color: #3326b5;
    }
    #errorMessage {
      color: #ff7777;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div id="content">
    <p id="message"></p>
    <a id="subscribeButton" href="https://t.me/Nicknaymes2bot" target="_blank"></a>
    <button id="checkButton"></button>
    <p id="errorMessage"></p>
  </div>

  <script>
    const texts = {
      ru: {
        notSubscribed: "Чтобы пользоваться этим мини-приложением, надо подписаться на канал",
        subscribe: "Подписаться",
        check: "Проверить",
        checking: "Проверка подписки...",
        error: "Ошибка. Убедитесь, что вы начали чат с ботом и повторите попытку."
      },
      en: {
        notSubscribed: "To use this mini-app, you must subscribe to the channel",
        subscribe: "Subscribe",
        check: "Check",
        checking: "Checking subscription...",
        error: "Error. Make sure you started a chat with the bot and try again."
      }
    };

    const lang = navigator.language.startsWith('ru') ? texts.ru : texts.en;

    const messageEl = document.getElementById('message');
    const subscribeBtn = document.getElementById('subscribeButton');
    const checkBtn = document.getElementById('checkButton');
    const errorMsg = document.getElementById('errorMessage');

    const botToken = '6537497957:AAHnaAc1x5qesBdNxOU9gQI27JdHvJ8IOMk';
    const channelId = '@Nicknaymes2bot';
    const redirectUrl = 'https://t.me/NickNaymesBot/create';

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('startapp');

    async function checkSubscription(userId) {
      try {
        messageEl.textContent = lang.checking;
        errorMsg.style.display = 'none';

        const res = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=${channelId}&user_id=${userId}`);
        const data = await res.json();

        if (!data.ok || !data.result) {
          errorMsg.textContent = lang.error;
          errorMsg.style.display = 'block';
          messageEl.textContent = lang.notSubscribed;
          return;
        }

        const status = data.result.status;
        if (['member', 'administrator', 'creator'].includes(status)) {
          window.location.href = redirectUrl;
        } else {
          messageEl.textContent = lang.notSubscribed;
        }
      } catch (err) {
        console.error('Ошибка запроса:', err);
        messageEl.textContent = lang.notSubscribed;
        errorMsg.textContent = lang.error;
        errorMsg.style.display = 'block';
      }
    }

    checkBtn.addEventListener('click', () => {
      if (userId) {
        checkSubscription(userId);
      } else {
        window.location.href = redirectUrl;
      }
    });

    subscribeBtn.textContent = lang.subscribe;
    checkBtn.textContent = lang.check;

    if (userId) {
      checkSubscription(userId);
    } else {
      messageEl.textContent = lang.notSubscribed;
    }
  </script>
</body>
</html>
