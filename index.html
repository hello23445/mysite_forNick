<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Подписка</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #060039;
      color: #d9d9d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .btn {
      background-color: #251897;
      color: #d9d9d9;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      margin: 10px;
    }

    .btn:hover {
      background-color: #3020b0;
    }
  </style>
</head>
<body>
  <h1 id="title">Загрузка...</h1>
  <a class="btn" id="subBtn" href="https://t.me/Nicknaymes2bot" target="_blank">Подписаться</a>
  <button class="btn" id="checkBtn" style="display:none;">Проверить</button>

  <script>
    const botToken = '6537497957:AAHnaAc1x5qesBdNxOU9gQI27JdHvJ8IOMk';
    const channelUsername = 'Nicknaymes2bot';
    const redirectUrl = 'https://t.me/NickNaymesBot/create';

    // Элементы UI
    const title = document.getElementById('title');
    const subBtn = document.getElementById('subBtn');
    const checkBtn = document.getElementById('checkBtn');

    // Язык
    const lang = navigator.language.startsWith('ru') ? 'ru' : 'en';
    const texts = {
      ru: {
        title: 'Чтобы пользоваться этим мини-приложением, подпишитесь на канал',
        button: 'Проверить',
        not_subscribed: 'Вы не подписаны на канал',
        loading: 'Проверяем подписку...',
      },
      en: {
        title: 'To use this mini app, subscribe to the channel',
        button: 'Check',
        not_subscribed: 'You are not subscribed to the channel',
        loading: 'Checking subscription...',
      }
    };

    // Получаем ID из URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('startapp');

    checkBtn.style.display = 'inline-block';
    checkBtn.textContent = texts[lang].button;
    title.textContent = userId ? texts[lang].loading : texts[lang].title;

    if (!userId) {
      // Нет ID — просто редирект при нажатии
      checkBtn.addEventListener('click', () => {
        window.location.href = redirectUrl;
      });
    } else {
      // Есть ID — проверка подписки
      checkBtn.addEventListener('click', () => checkSub(userId));
      checkSub(userId);
    }

    function checkSub(userId) {
      title.textContent = texts[lang].loading;

      fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=@${channelUsername}&user_id=${userId}`)
        .then(res => res.json())
        .then(data => {
          const status = data?.result?.status;
          if (['member', 'administrator', 'creator'].includes(status)) {
            window.location.href = redirectUrl;
          } else {
            title.textContent = texts[lang].not_subscribed;
          }
        })
        .catch(() => {
          title.textContent = texts[lang].not_subscribed;
        });
    }
  </script>
</body>
</html>
