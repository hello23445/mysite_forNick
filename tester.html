<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TG WebApp Debug (alerts)</title>
</head>
<body>
  <!-- Подключаем telegram sdk -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
  (function(){
    let log = [];

    function add(msg){
      log.push(msg);
    }

    const hasTg = !!(window.Telegram && Telegram.WebApp);
    add('[TG DEBUG] Telegram.WebApp present: ' + (hasTg ? 'YES' : 'NO'));
    if(!hasTg){
      add('Если NO: вы не в Telegram Web App или скрипт блокируется. Нужно открыть через кнопку web_app.');
      alert(log.join("\n"));
      return;
    }

    const tg = Telegram.WebApp;
    try {
      tg.ready();
      add('[TG DEBUG] tg.ready() вызван успешно');
    } catch(e){
      add('[TG DEBUG] tg.ready() вызвал ошибку: ' + (e?.message || e));
    }

    const initData = tg.initData || '';
    const initDataUnsafe = tg.initDataUnsafe || {};
    add('[TG DEBUG] tg.initData length: ' + initData.length);
    add('[TG DEBUG] tg.initDataUnsafe.user present: ' + (initDataUnsafe.user ? 'YES' : 'NO'));

    function parseInit(s){
      if(!s) return null;
      return s.split('&').reduce(function(acc,p){
        var parts = p.split('=');
        var k = parts[0] || '';
        var v = parts.slice(1).join('=') || '';
        try { acc[decodeURIComponent(k)] = decodeURIComponent(v); } catch(e) { acc[k] = v; }
        return acc;
      }, {});
    }
    const parsed = parseInit(initData);
    add('[TG DEBUG] parsed.initData keys: ' + (parsed ? Object.keys(parsed).join(', ') : '---'));
    add('[TG DEBUG] hash present: ' + (parsed?.hash ? 'YES' : 'NO'));
    if(parsed?.user){
      try {
        var userJson = JSON.stringify(JSON.parse(parsed.user));
        add('[TG DEBUG] user param in initData: YES -> ' + userJson);
      } catch(e){
        add('[TG DEBUG] user param in initData: YES but invalid JSON');
      }
    } else {
      add('[TG DEBUG] user param in initData: NO');
    }

    add('--- ОКРУЖЕНИЕ ---');
    add('location.href: ' + location.href);
    add('document.referrer: ' + document.referrer);
    add('protocol (https?): ' + (location.protocol === 'https:' ? 'YES' : 'NO'));
    add('navigator.userAgent: ' + navigator.userAgent);

    var ua = navigator.userAgent.toLowerCase();
    var likelyExternal = !ua.includes('telegram') && (ua.includes('chrome') || ua.includes('firefox') || ua.includes('safari'));
    if(likelyExternal){
      add('[HINT] Похоже, открыто во внешнем браузере, а не в Telegram WebView.');
    }
    if(!initData){
      add('[HINT] initData пуст. Нужно открывать через кнопку web_app у бота.');
    }
    if(parsed && !parsed.hash){
      add('[HINT] В initData нет hash — скорее всего бот открыл обычную ссылку, а не web_app.');
    }

    try {
      var scripts = Array.from(document.scripts).map(s => s.src||'').filter(Boolean);
      var foundTg = scripts.some(s => s.includes('telegram-web-app.js'));
      if(!foundTg){
        add('[HINT] telegram-web-app.js не найден среди <script> тегов.');
      } else {
        add('[TG DEBUG] telegram-web-app.js загружен корректно');
      }
    } catch(e){
      add('[TG DEBUG] Ошибка при проверке скриптов: ' + (e?.message || e));
    }

    add('[EXAMPLE] Пример inline keyboard для web_app:\n{"reply_markup":{"inline_keyboard":[[{"text":"Open","web_app":{"url":"https://your-site.example.com"}}]]}}');

    add('[TG DEBUG] Диагностика завершена.');

    alert(log.join("\n"));
  })();
  </script>
</body>
</html>
