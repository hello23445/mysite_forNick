<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #060039;
            color: #d9d9d9;
            margin: 0;
            padding: 0;
        }
        #maintenance {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: red;
            padding: 10px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            padding: 10px 20px;
        }
        #mainTopBar {
            justify-content: flex-end;
        }
        #settingsTopBar {
            justify-content: space-between;
        }
        #settingsTopBar .title {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .top-bar button {
            background: none;
            border: none;
            color: #d9d9d9;
            font-size: 24px;
            cursor: pointer;
        }
        .main {
            text-align: center;
            margin-top: 30px;
            padding: 0 10px;
        }
        lanzarote
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1%;
            margin-top: 20px;
            justify-items: center;
        }
        .buttons-container button, .settings-buttons button {
            padding: 8px;
            background-color: #251897;
            color: #d9d9d9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 1%;
            box-shadow: 0 2px 4px black;
        }
        .settings-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1%;
            margin-top: 20px;
            justify-items: center;
        }
        #settingsMenu {
            display: none;
            padding: 20px 10px;
        }
        #langSelect {
            width: 150px;
            margin-top: 15px;
            background-color: #251897;
            color: #d9d9d9;
            border-radius: 8px;
            border: none;
            padding: 8px;
            cursor: pointer;
        }
        @media (max-width: 480px) {
            .buttons-container {
                grid-template-columns: 1fr;
            }
            .buttons-container button, .settings-buttons button {
                width: 100%;
            }
            #langSelect {
                width: 100%;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
<!-- Техническое обслуживание -->
<div id="maintenance">
    <h2 data-translate="maintenance" id="maintenanceM"></h2>
</div>

<!-- Главное меню -->
<div class="top-bar" id="mainTopBar">
    <button id="settingsBtn" style="background-color: rgb(9, 9, 117);"><i class="fa-solid fa-gear"></i></button>
</div>

<div class="main" id="mainMenu">
    <h2 data-translate="main" id="mainM"></h2>
    <div class="buttons-container" id="featureButtons"></div>
</div>

<!-- Меню настроек -->
<div id="settingsMenu">
    <div class="top-bar" id="settingsTopBar">
        <button id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
        <span class="title" data-translate="settingsTitle" id="settingsTitle"></span>
        <span style="width:24px;"></span> <!-- пустое место справа -->
    </div>
    <div>
        <button id="tok" style="background-color: #060039; color: white; padding: 8px;">Your token</button><br>
        <button id="userID" style="background-color: #060039; color: white; padding: 8px;">Your user ID</button><br>
        <select id="langSelect" style="padding: 15px; width: 50%;"></select>
    </div>
    <div class="settings-buttons" id="settingsButtons"></div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // Инструкция по добавлению кнопок
    // 1. Добавьте новый ключ в массив featureKeys
    // 2. Добавьте соответствующий текст в translations[lang].featureButtons
    // 3. Убедитесь, что файлы в объектах filesRu и filesEn соответствуют ключам
    // 4. Убедитесь, что файлы существуют и доступны по указанным путям
    const filesRu = {
        nickname: 'nickname.html',
        description: 'description.html',
        profile: 'avatar.html',
        lego: 'lego.html',
        font: 'font.html',
        sites: 'https://sites.google.com/',
        ascii: 'ascii.html',
        qr: 'qr.html',
        music: 'music.html',
        colors: 'colors.html',
        ai: 'ai.html',
        support: 'support.html',
        connection: 'connection.html'
    };

    const filesEn = {
        nickname: 'nickname_en.html',
        description: 'description_en.html',
        profile: 'avatar_en.html',
        lego: 'lego_en.html',
        font: 'font_en.html',
        sites: 'https://sites.google.com/',
        ascii: 'ascii_en.html',
        qr: 'qr_en.html',
        music: 'music_en.html',
        colors: 'colors_en.html',
        ai: 'ai_en.html',
        support: 'support_en.html',
        connection: 'connection_en.html'
    };

    let lang = localStorage.getItem('lang') || 'en';

    let translations = {
        ru: {
            main: "Что будем создавать?",
            maintenance: "Проводится техническое обслуживание.",
            settingsTitle: "Настройки",
            featureButtons: [
                "Никнейм", "Описание", "Аватарка", "Лего", "Шрифт", "Сайт",
                "Символ-арт", "QR-код", "Музыка", "Цвета", "ИИ-Генератор"
            ],
            settingsButtons: ["Поддержка", "Проверка соединения"],
            langOptions: ["Русский", "English"]
        },
        en: {
            main: "What do you want to create?",
            maintenance: "Maintenance in progress.",
            settingsTitle: "Settings",
            featureButtons: [
                "Nickname", "Description", "Profile", "Lego", "Font", "Sites",
                "ASCII-art", "QR-code", "Music", "Colors", "AI-Generator"
            ],
            settingsButtons: ["Support", "Connection check"],
            langOptions: ["Русский", "English"]
        }
    };

    function applyTranslations() {
        const files = lang === 'ru' ? filesRu : filesEn;

        // Apply translations
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang][key]) {
                el.textContent = translations[lang][key];
            }
        });

        // Feature buttons
        const featureContainer = document.getElementById('featureButtons');
        featureContainer.innerHTML = '';
        const featureKeys = ['nickname', 'description', 'profile', 'lego', 'font', 'sites', 'ascii', 'qr', 'music', 'colors', 'ai'];
        translations[lang].featureButtons.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.textContent = text;
            btn.onclick = () => {
                const url = files[featureKeys[i]];
                if (url === 'https://sites.google.com/') {
                    window.open(url, '_blank');
                } else {
                    window.location.href = url;
                }
            };
            featureContainer.appendChild(btn);
        });

        // Settings buttons
        const settingsContainer = document.getElementById('settingsButtons');
        settingsContainer.innerHTML = '';
        const settingsKeys = ['support', 'connection'];
        translations[lang].settingsButtons.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.textContent = text;
            btn.onclick = () => {
                const url = files[settingsKeys[i]];
                window.location.href = url;
            };
            settingsContainer.appendChild(btn);
        });

        // Language select
        const langSelect = document.getElementById('langSelect');
        langSelect.innerHTML = '';
        translations[lang].langOptions.forEach((text, i) => {
            const option = document.createElement('option');
            option.value = i === 0 ? 'ru' : 'en';
            option.textContent = text;
            option.selected = (option.value === lang);
            langSelect.appendChild(option);
        });
    }

    // Применяем переводы
    applyTranslations();

    // Обновляем текст токена и ID при смене языка
    const storedUserId = localStorage.getItem('userID');
    const storedToken = localStorage.getItem('userToken');
    if (storedUserId && storedUserId !== 'null' && storedUserId !== 'false') {
        document.getElementById('userID').textContent = lang === 'ru' ? 
            `Ваш ID: ${storedUserId} (Нажмите для копирования)` : 
            `Your ID: ${storedUserId} (Click to copy)`;
    } else {
        document.getElementById('userID').style.display = 'none';
    }
    if (storedToken && storedToken !== 'null' && storedToken !== 'false') {
        document.getElementById('tok').textContent = lang === 'ru' ? 
            `Ваш токен: ${storedToken} (Нажмите для копирования)` : 
            `Your token: ${storedToken} (Click to copy)`;
    } else {
        document.getElementById('tok').style.display = 'none';
    }

    // События
    document.getElementById('settingsBtn').onclick = () => {
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('mainTopBar').style.display = 'none';
        document.getElementById('settingsMenu').style.display = 'block';
    };

    document.getElementById('backBtn').onclick = () => {
        document.getElementById('settingsMenu').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'block';
        document.getElementById('mainTopBar').style.display = 'flex';
    };

    document.getElementById('langSelect').onchange = function() {
        lang = this.value;
        localStorage.setItem('lang', lang);
        applyTranslations();
        // Обновляем текст токена и ID при смене языка
        const storedUserId = localStorage.getItem('userID');
        const storedToken = localStorage.getItem('userToken');
        if (storedUserId && storedUserId !== 'null' && storedUserId !== 'false') {
            document.getElementById('userID').textContent = lang === 'ru' ? 
                `Ваш ID: ${storedUserId} (Нажмите для копирования)` : 
                `Your ID: ${storedUserId} (Click to copy)`;
            document.getElementById('userID').style.display = 'block';
        } else {
            document.getElementById('userID').style.display = 'none';
        }
        if (storedToken && storedToken !== 'null' && storedToken !== 'false') {
            document.getElementById('tok').textContent = lang === 'ru' ? 
                `Ваш токен: ${storedToken} (Нажмите для копирования)` : 
                `Your token: ${storedToken} (Click to copy)`;
            document.getElementById('tok').style.display = 'block';
        } else {
            document.getElementById('tok').style.display = 'none';
        }
    };

    // Обработчик клика для копирования токена
    document.getElementById('tok').onclick = function() {
        const userToken = localStorage.getItem('userToken');
        if (userToken && userToken !== 'null' && userToken !== 'false') {
            const textArea = document.createElement("textarea");
            textArea.value = userToken;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert(lang === 'ru' ? 'Токен скопирован!' : 'Token copied!');
            } catch (err) {
                alert(lang === 'ru' ? 'Не удалось скопировать токен.' : 'Failed to copy token.');
            }
            document.body.removeChild(textArea);
        }
    };

    // Обработчик клика для копирования ID
    document.getElementById('userID').onclick = function() {
        const userId = localStorage.getItem('userID');
        if (userId && userId !== 'null' && userId !== 'false') {
            const textArea = document.createElement("textarea");
            textArea.value = userId;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert(lang === 'ru' ? 'ID скопирован!' : 'ID copied!');
            } catch (err) {
                alert(lang === 'ru' ? 'Не удалось скопировать ID.' : 'Failed to copy ID.');
            }
            document.body.removeChild(textArea);
        }
    };

    // Обработка технического обслуживания
    const m = localStorage.getItem('m');
    if (m === 'Уже' || m === 'уже') {
        document.querySelectorAll("div").forEach(el => el.style.display = "none");
        alert(lang === 'ru' ? 'Идет техническое обслуживание' : 'Maintenance in progress');
        document.getElementById('maintenance').style.display = 'block';
        document.getElementById('maintenanceM').textContent = translations[lang].maintenance;
    } else if (m === 'Скоро' || m === 'скоро') {
        alert(lang === 'ru' ? 'Скоро начнется техническое обслуживание' : 'Maintenance will start soon');
    }

    function checkUserId() {
        const tg = window.Telegram?.WebApp;
        if (!tg) {
            alert('Ошибка: Telegram WebApp не инициализирован.');
            return;
        }
        alert('Telegram WebApp найден.');

        const initData = tg.initDataUnsafe;
        if (!initData) {
            alert('Ошибка: initDataUnsafe не доступен.');
            return;
        }
        alert('initDataUnsafe доступен.');

        if (!initData.user) {
            alert('Ошибка: объект user отсутствует в initDataUnsafe.');
            return;
        }
        alert('Объект user найден: ' + JSON.stringify(initData.user));

        const userId = initData.user.id || null;
        if (userId) {
            alert(`Успешно получен userID: ${userId}`);
            localStorage.setItem('userID', userId);
            document.getElementById('userID').textContent = lang === 'ru' ? 
                `Ваш ID: ${userId} (Нажмите для копирования)` : 
                `Your ID: ${userId} (Click to copy)`;
        } else {
            alert('Ошибка: user.id не найден в объекте user: ' + JSON.stringify(initData.user));
        }
    }

    // Вызываем функцию проверки с задержкой для обеспечения загрузки Telegram WebApp
    setTimeout(checkUserId, 1000);
</script>
</body>
</html>
