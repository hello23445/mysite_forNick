<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --bg: #060039;
            --bg-soft: #0b0660;
            --card: #0d0870;
            --text: #d9d9d9;
            --muted: #a7a7c7;
            --accent: #5f57ff;
            --accent-2: #8f87ff;
            --btn: #251897;
            --shadow: rgba(0,0,0,.35);
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
            background: radial-gradient(1200px 800px at 80% -10%, #100a7a 0%, var(--bg) 60%);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, rgba(0,0,0,.35), transparent);
            backdrop-filter: blur(6px);
        }
        #mainTopBar { justify-content: flex-end; }
        #settingsTopBar { justify-content: space-between; gap: 8px; }
        #settingsTopBar .title { flex: 1; text-align: center; font-weight: 700; font-size: 18px; letter-spacing: .3px; }
        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: #090975; border: 1px solid rgba(255,255,255,.08);
            color: var(--text); font-size: 18px; width: 40px; height: 40px; border-radius: 12px;
            cursor: pointer; transition: transform .08s ease, box-shadow .2s ease, background .2s ease;
            box-shadow: 0 6px 18px var(--shadow);
        }
        .icon-btn:hover { transform: translateY(-1px); background: #0b0bb0; }

        .main { text-align: center; margin: 24px auto 0; padding: 0 14px; max-width: 860px; }
        h2 { margin: 12px 0 10px; font-weight: 800; }

        .buttons-container {
            display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 16px; justify-items: stretch;
        }
        .settings-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 16px; }

        .btn {
            --pad: 12px;
            padding: var(--pad);
            background: linear-gradient(180deg, var(--btn), #1b1280);
            color: var(--text); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; cursor: pointer; width: 100%; font-size: 14px; font-weight: 600;
            box-shadow: 0 6px 18px var(--shadow);
            transition: transform .08s ease, box-shadow .2s ease, background .2s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 22px var(--shadow); }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .btn .fa-solid, .btn .fa-regular { margin-right: 8px; }

        /* Modern settings card */
        #settingsMenu { display: none; padding: 20px 14px 32px; }
        .settings-wrap { max-width: 880px; margin: 0 auto; }
        .card {
            background: linear-gradient(180deg, var(--card), #0b0862);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 18px; padding: 16px; box-shadow: 0 16px 40px var(--shadow);
        }
        .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .card h3 { margin: 8px 4px 12px; font-size: 16px; color: var(--muted); font-weight: 700; letter-spacing: .3px; }

        .field { display: flex; align-items: center; gap: 10px; }
        select#langSelect { flex: 1; min-width: 160px; padding: 12px; background: var(--bg-soft); color: var(--text); border-radius: 12px; border: 1px solid rgba(255,255,255,.08); }

        #tok { margin-top: 8px; background: var(--bg); border: 1px dashed rgba(255,255,255,.15); }

        #maintenance { display: none; text-align: center; margin-top: 20px; color: #ff6b6b; padding: 12px; }

        @media (max-width: 560px) {
            .buttons-container { grid-template-columns: 1fr; }
            /* На мобильных: токен под селектом языка */
            .field { flex-direction: column; align-items: stretch; }
            #langSelect { order: 1; width: 100%; min-width: 100%; padding: 14px; font-size: 22px;}
            #tok { order: 2; width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Техническое обслуживание -->
    <div id="maintenance">
        <h2 data-translate="maintenance" id="maintenanceM"></h2>
    </div>

    <!-- Главное меню -->
    <div class="top-bar" id="mainTopBar">
        <button class="icon-btn" id="settingsBtn" title="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>

    <div class="main" id="mainMenu">
        <h2 data-translate="main" id="mainM"></h2>
        <div class="buttons-container" id="featureButtons"></div>
    </div>

    <!-- Меню настроек -->
    <div id="settingsMenu">
        <div class="top-bar" id="settingsTopBar">
            <button class="icon-btn" id="backBtn" title="Back"><i class="fa-solid fa-arrow-left"></i></button>
            <span class="title" data-translate="settingsTitle" id="settingsTitle"></span>
            <span style="width:40px; height:40px;"></span> <!-- баланс правой части -->
        </div>

        <div class="settings-wrap">
            <div class="row">
                <div class="card">
                    <h3 data-translate="langSectionTitle">Язык / Language</h3>
                    <div class="field">
                        <select id="langSelect"></select>
                        <button class="btn" id="tok"><i class="fa-solid fa-key"></i><span>Token</span></button>
                    </div>
                </div>
                <div class="card">
                    <h3 data-translate="supportSectionTitle">Поддержка</h3>
                    <div class="settings-buttons" id="settingsButtons"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /*
        ===================== ПАМЯТКА/ИНСТРУКЦИЯ =====================
        1) КАК ДОБАВИТЬ КНОПКУ В ГЛАВНОЕ МЕНЮ:
           a) В объекте filesRu/filesEn добавьте путь для новой фичи, например:
              filesRu.mytool = 'mytool.html';   filesEn.mytool = 'mytool_en.html';
           b) В translations[ru|en].featureButtons добавьте подпись кнопки (в конец списка).
           c) В массив featureKeys ниже добавьте ключ 'mytool' на ту же позицию, что и подпись.
           d) Кнопка появится автоматически; если это внешний сайт, укажите полный URL — он откроется в новой вкладке.

        2) КАК ДОБАВИТЬ КНОПКУ В НАСТРОЙКИ:
           Вариант А — переход на внутреннюю страницу:
             - Добавьте путь в filesRu/filesEn, например: filesRu.help = 'help.html'; filesEn.help = 'help_en.html';
             - Добавьте текст в translations[lang].settingsButtons и ключ в settingsKeys (ниже).
           Вариант Б — внешняя ссылка (например, форму жалобы или поддержку):
             - Укажите ссылку в объекте LINKS ниже (complaintRU, supportRU/EN).
             - Кнопки создаются динамически в функции applyTranslations() в блоке "EXTRA".
             - Для кнопки, показываемой только на русском ("Написать жалобу"), ничего менять в EN не нужно.
        ==============================================================
        */

        // ===== Ссылки, которые вы укажете =====
        const LINKS = {
            complaintRU: "https://t.me/NickNaymesBot/submit_complaints",              // TODO: сюда вставьте ссылку на форму жалобы (только RU)
            supportRU:   "https://t.me/Clickerstart_bot",              // TODO: ссылка на поддержку (RU)
            supportEN:   "https://t.me/Clickerstart_bot"               // TODO: ссылка на поддержку (EN)
        };

        // ===== Карта файлов =====
        const filesRu = {
            nickname: 'nickname.html',
            description: 'description.html',
            profile: 'avatar.html',
            lego: 'lego.html',
            font: 'font.html',
            sites: 'https://sites.google.com/',
            ascii: 'ascii.html',
            qr: 'qr.html',
            music: 'music.html',
            colors: 'colors.html',
            ai: 'ai.html',
            support: 'support.html',
            connection: 'connection.html'
        };

        const filesEn = {
            nickname: 'nickname_en.html',
            description: 'description_en.html',
            profile: 'avatar_en.html',
            lego: 'lego_en.html',
            font: 'font_en.html',
            sites: 'https://sites.google.com/',
            ascii: 'ascii_en.html',
            qr: 'qr_en.html',
            music: 'music_en.html',
            colors: 'colors_en.html',
            ai: 'ai_en.html',
            support: 'support_en.html',
            connection: 'connection_en.html'
        };

        // ===== Язык =====
        let lang = localStorage.getItem('lang') || 'en';
        let isTokenVisible = false; // Флаг для отслеживания видимости токена

        // ===== Переводы =====
        let translations = {
            ru: {
                main: "Что будем создавать?",
                maintenance: "Проводится техническое обслуживание.",
                settingsTitle: "Настройки",
                langSectionTitle: "Настройки языка и токена",
                supportSectionTitle: "Поддержка и связь",
                featureButtons: [
                    "Никнейм","Описание","Аватарка","Лего","Шрифт","Сайт",
                    "Символ-арт","QR-код","Музыка","Цвета","ИИ-Генератор"
                ],
                settingsButtons: ["Поддержка","Проверка соединения"],
                langOptions: ["Русский","English"],
                writeComplaint: "Написать жалобу",
                writeSupport: "Написать в службу поддержки"
            },
            en: {
                main: "What do you want to create?",
                maintenance: "Maintenance in progress.",
                settingsTitle: "Settings",
                langSectionTitle: "Language & token",
                supportSectionTitle: "Support",
                featureButtons: [
                    "Nickname","Description","Profile","Lego","Font","Sites",
                    "ASCII-art","QR-code","Music","Colors","AI-Generator"
                ],
                settingsButtons: ["Support","Connection check"],
                langOptions: ["Русский","English"],
                writeComplaint: "", // специально пусто — эта кнопка только для RU
                writeSupport: "Contact Support"
            }
        };

        function createButton({ text, icon, onClick, href, newTab=false, disabled=false, id }) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            if (id) btn.id = id;
            if (icon) {
                const i = document.createElement('i');
                i.className = icon;
                btn.appendChild(i);
            }
            const span = document.createElement('span');
            span.textContent = text;
            btn.appendChild(span);

            if (href) {
                btn.onclick = () => { newTab ? window.open(href, '_blank') : window.location.href = href; };
            } else if (onClick) {
                btn.onclick = onClick;
            }
            if (disabled) {
                btn.disabled = true;
                btn.title = 'Укажите ссылку в объекте LINKS';
            }
            return btn;
        }

        function applyTranslations() {
            const files = lang === 'ru' ? filesRu : filesEn;

            // Apply text translations
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[lang][key] !== undefined) {
                    el.textContent = translations[lang][key];
                }
            });

            // ===== Главные кнопки (фичи) =====
            const featureContainer = document.getElementById('featureButtons');
            featureContainer.innerHTML = '';
            const featureKeys = ['nickname','description','profile','lego','font','sites','ascii','qr','music','colors','ai'];
            translations[lang].featureButtons.forEach((text, i) => {
                const url = files[featureKeys[i]];
                const isExternal = /^https?:\/\//i.test(url);
                const btn = createButton({ text, icon: 'fa-solid fa-shapes', href: url, newTab: isExternal });
                featureContainer.appendChild(btn);
            });

            // ===== Кнопки настроек (базовые) =====
            const settingsContainer = document.getElementById('settingsButtons');
            settingsContainer.innerHTML = '';
            const settingsKeys = ['support','connection'];
            const settingsIcons = ['fa-solid fa-circle-info','fa-solid fa-wifi'];
            translations[lang].settingsButtons.forEach((text, i) => {
                const url = files[settingsKeys[i]];
                const btn = createButton({ text, icon: settingsIcons[i], href: url });
                settingsContainer.appendChild(btn);
            });

            // ===== EXTRA: внешние ссылки =====
            // RU только: "Написать жалобу"
            if (lang === 'ru') {
                const hasLink = !!LINKS.complaintRU && /^https?:\/\//i.test(LINKS.complaintRU);
                const complaintBtn = createButton({
                    text: translations.ru.writeComplaint,
                    icon: 'fa-solid fa-pen-to-square',
                    href: hasLink ? LINKS.complaintRU : undefined,
                    newTab: true,
                    disabled: !hasLink
                });
                settingsContainer.appendChild(complaintBtn);
            }

            // RU/EN: "Написать в службу поддержки" / "Contact Support"
            const supportLink = lang === 'ru' ? LINKS.supportRU : LINKS.supportEN;
            const supportOk = !!supportLink && /^https?:\/\//i.test(supportLink);
            const writeSupportBtn = createButton({
                text: translations[lang].writeSupport,
                icon: 'fa-solid fa-headset',
                href: supportOk ? supportLink : undefined,
                newTab: true,
                disabled: !supportOk
            });
            settingsContainer.appendChild(writeSupportBtn);

            // ===== Выпадающий список языков =====
            const langSelect = document.getElementById('langSelect');
            langSelect.innerHTML = '';
            translations[lang].langOptions.forEach((text, i) => {
                const option = document.createElement('option');
                option.value = i === 0 ? 'ru' : 'en';
                option.textContent = text;
                option.selected = (option.value === lang);
                langSelect.appendChild(option);
            });

            // Сброс флага видимости токена и обновление подписи
            isTokenVisible = false;
            updateTokenLabel();
        }

        function updateTokenLabel() {
            const userToken = localStorage.getItem('userToken') || '';
            const tokBtn = document.getElementById('tok');
            const maskedToken = userToken ? '*'.repeat(userToken.length) : '';
            if (isTokenVisible) {
                tokBtn.innerHTML = '<i class="fa-solid fa-key"></i><span>' + 
                    (lang === 'ru' ? 'Ваш токен: ' + userToken + ' (Нажмите для копирования)' : 
                    'Your token: ' + userToken + ' (Click to copy)') + '</span>';
            } else {
                tokBtn.innerHTML = '<i class="fa-solid fa-key"></i><span>' + 
                    (lang === 'ru' ? 'Ваш токен: ' + maskedToken + ' (Нажмите для показа)' : 
                    'Your token: ' + maskedToken + ' (Click to show)') + '</span>';
            }
        }

        // ===== Initial load =====
        applyTranslations();

        // ===== Events =====
        document.getElementById('settingsBtn').onclick = () => {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainTopBar').style.display = 'none';
            document.getElementById('settingsMenu').style.display = 'block';
            isTokenVisible = false; // Скрываем токен при входе в настройки
            updateTokenLabel();
        };

        document.getElementById('backBtn').onclick = () => {
            document.getElementById('settingsMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('mainTopBar').style.display = 'flex';
        };

        document.getElementById('langSelect').onchange = function() {
            lang = this.value;
            localStorage.setItem('lang', lang);
            isTokenVisible = false; // Сбрасываем видимость при смене языка
            applyTranslations();
        };

        document.getElementById('tok').onclick = function() {
            const userToken = localStorage.getItem('userToken') || '';
            if (!isTokenVisible) {
                isTokenVisible = true;
                updateTokenLabel();
            } else {
                const textArea = document.createElement('textarea');
                textArea.value = userToken;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert(lang === 'ru' ? 'Токен скопирован!' : 'Token copied!');
                } catch (err) {
                    alert(lang === 'ru' ? 'Не удалось скопировать токен.' : 'Failed to copy token.');
                }
                document.body.removeChild(textArea);
                isTokenVisible = false; // Скрываем токен после копирования
                updateTokenLabel();
            }
        };

        // ===== Maintenance check =====
        const m = localStorage.getItem('m');
        if (m === 'Уже' || m === 'уже') {
            document.querySelectorAll('div').forEach(el => el.style.display = 'none');
            alert(lang === 'ru' ? 'Идет техническое обслуживание' : 'Maintenance in progress');
            document.getElementById('maintenance').style.display = 'block';
            document.getElementById('maintenanceM').textContent = translations[lang].maintenance;
        } else if (m === 'Скоро' || m === 'скоро') {
            alert(lang === 'ru' ? 'Скоро начнется техническое обслуживание' : 'Maintenance will start soon');
        }
    </script>
</body>
</html>
