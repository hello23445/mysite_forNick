<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Description Generator</title>
  <!-- Link to Google Fonts (new fonts will work if available) -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Lato&family=Oswald&family=Merriweather&display=swap" rel="stylesheet">
  <!-- Font Awesome for toggle icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      /* Background changed to light blue gradient */
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      display: flex;
      justify-content: center;
      /* Screen shifted upwards */
      align-items: flex-start;
      padding-top: 30px;
      min-height: 100vh;
      margin: 0;
    }
    .screen {
      display: none;
      flex-direction: column;
      width: 90%;
      max-width: 600px;
      background: white;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      margin-top: 10px;
    }
    .screen.active {
      display: flex;
    }
    h1 {
      text-align: center;
    }
    textarea, select {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    #preview {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      text-align: center;
      border-radius: 5px;
      font-size: 1.2em;
      font-weight: bold;
    }
    .buttons, .inline-buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-green {
      background: #28a745;
      color: white;
    }
    /* Spacing between select and "Random" button */
    #randomEmojiBtn {
      margin-left: 10px;
    }
    #decorationSettings {
      display: none;
      margin-top: 10px;
    }
    /* Arrange decoration checkboxes vertically with small spacing */
    #decorationSettings label {
      display: block;
      margin-bottom: 5px;
    }
    /* Spacing between decoration block and formatting settings */
    .formatting-container {
      margin-top: 20px;
    }
    /* Toggle styling */
    .toggle-row { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .toggle-icon { width:36px; height:22px; display:inline-flex; align-items:center; justify-content:center; border-radius:8px; background:#e5e7eb; color:#111; }
    .toggle-icon[data-checked="true"] { background:#10b981; color:#fff; }
    .toggle-row b { margin:0; }
    /* Container for shadow slider */
    #shadowRangeContainer {
      margin-top: 10px;
      display: none;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #f0f8ff;
      border-radius: 10px;
      text-align: center;
      font-size: 1.2em;
      font-weight: bold;
    }
    .copy-message {
      color: darkgreen;
      font-weight: bold;
      margin-top: 10px;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .action-buttons {
      display: flex;          /* Включаем flex-контейнер */
      flex-wrap: wrap;        /* Разрешаем перенос на новую строку */
      gap: 10px;              /* Расстояние между кнопками */
    }

    .action-buttons button {
      flex: 1 1 calc(50% - 10px); /* Каждая кнопка занимает половину ряда минус отступ */
      padding: 10px;
      box-sizing: border-box;
    }
    .back-btn {
      display: block;
      margin-bottom: 20px;
      width: 100%;
      padding: 12px 20px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: #218838;
    }
    @media (max-width: 600px) {
      .back-btn {
        font-size: 0.9rem;
        padding: 10px;
        margin-bottom: 15px;
      }
    }

  </style>
</head>

button.addEventListener('click', () => {

    let loved = localStorage.getItem('loved_descs');

    const resetButton = () => {
        setTimeout(() => {
            button.textContent = 'В избранное';
        }, 3500);
    };

    // функция очистки текста от запятых
    function cleanDescFromCommas(text) {
        if (!text) return '';
        let res = '';
        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            if (ch === ',') {
                const next = text[i + 1];
                if (next === ' ') {
                    // убираем запятую перед пробелом
                    continue;
                } else {
                    // одиночная запятая -> пробел (без дублей)
                    if (res.length === 0 || res[res.length - 1] !== ' ') {
                        res += ' ';
                    }
                }
            } else {
                res += ch;
            }
        }
        return res.replace(/\s+/g, ' ').trim();
    }

    const cleanedDesc = cleanDescFromCommas(fullDescription.textContent);

    if (!loved) {
        // если ничего нет – создаём строку с первым элементом
        loved = cleanedDesc;
        localStorage.setItem('loved_descs', loved);
        button.textContent = "✅";
        resetButton();
    } else {
        // проверяем, есть ли уже
        let lovedArray = loved.split(',').map(item => item.trim());
        if (lovedArray.includes(cleanedDesc)) {
            button.textContent = "Уже в избранном";
            resetButton();
        } else {
            loved += `, ${cleanedDesc}`;
            localStorage.setItem('loved_descs', loved);
            button.textContent = "✅";
            resetButton();
        }
    }
});

function getFormatStyle() {
  let style = "";
  switch(selectedFormat) {
    case 'italic':
      style += "font-style: italic;";
      break;
    case 'bold':
      style += "font-weight: bold;";
      break;
    case 'underline':
      style += "text-decoration: underline;";
      break;
    case 'line-through':
      style += "text-decoration: line-through;";
      break;
    case 'uppercase':
      style += "text-transform: uppercase;";
      break;
    case 'shadow':
      style += `text-shadow: ${shadowStrength}px ${shadowStrength}px ${shadowStrength}px rgba(0,0,0,0.3);`;
      break;
    default:
      break;
  }
  return style;
}

    copyBtn.style.background = '#e8f5e9';
  }, 3000);
});

shareBtn.addEventListener('click', () => {
  const url = `https://t.me/share/url?url=${encodeURIComponent(result.textContent)}`;
  window.open(url, '_blank');
  if (localStorage.getItem('shared_descriptions')){
  localStorage.setItem('shared_descriptions', String(Number(localStorage.getItem('shared_descriptions')) + 1));
  }
  else{
  localStorage.setItem('shared_descriptions', '1');
  }
});

back2.addEventListener('click', () => {
  screen2.classList.remove('active');
  screen1.classList.add('active');
});

back3.addEventListener('click', () => {
  screen3.classList.remove('active');
  screen2.classList.add('active');
});

// Hide decoration settings on page load if "No Decoration" is selected
if (emojiSelect.value === '') {
  decorationSettings.style.display = 'none';
}

if (localStorage.getItem('premium') === 'yes'){
  descriptionInput.maxLength = 1000;
}
else{
  descriptionInput.maxLength = 200;
}
</script>

<script>
// Enforce bad-words (EN)
(function(){
  const banned=['говно','хейт','порно','fuck','idiot','сука','nigger'];
  function containsBad(t){ if(!t) return false; const s=t.toLowerCase(); return banned.some(w=>s.includes(w)); }
  document.addEventListener('DOMContentLoaded', ()=>{
    document.querySelectorAll('input, textarea').forEach(el=>{ const h=()=>{ if(containsBad(el.value)){ if (typeof showAlertModal === 'function') showAlertModal('Field contains inappropriate words.'); el.value=''; }}; el.addEventListener('input', h); el.addEventListener('blur', h); });
  });
})();

}
