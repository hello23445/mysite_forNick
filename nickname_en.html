<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nickname Generator</title>
    <style>
        :root {
            --bg-color: #060039;
            --text-color: #d9d9d9;
            --btn-color: #251897;
            --btn-hover: #3a259e;
            --card-bg: #0e004f;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        h1 { text-align: center; margin-bottom: 20px; font-size: 2rem; }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        #nickname-input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #3a259e;
            border-radius: 8px;
            background: #1a005f;
            color: var(--text-color);
        }
        .btn {
            padding: 12px 20px;
            background: var(--btn-color);
            color: var(--text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            max-width: 150px;
            width: 100%;
            text-align: center;
        }

        #to-decorate.hidden { display: none; }
        .examples, .decorated-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .examples span {
            background: #1a005f;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .decorated-list button {
            background: #ffffff;
            color: var(--bg-color);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            border: 1px solid #3a259e;
            word-break: break-all;
            white-space: normal;
            max-width: 100%;
        }

        #final-nickname {
            margin-top: 20px;
            font-size: 1.5rem;
            text-align: center;
            padding: 12px;
            background: #1a005f;
            border-radius: 8px;
            word-break: break-all;
        }
        #message {
            text-align: center;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .back-btn {
            display: block;
            margin-bottom: 20px;
            width: 100%;
            padding: 12px 20px;
            background: var(--btn-color);
            color: var(--text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: var(--btn-hover);
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            #nickname-input {
                min-width: 100%;
            }
            .btn {
                max-width: 100%;
                font-size: 0.9rem;
                padding: 10px;
            }
            .back-btn {
                font-size: 0.9rem;
                padding: 10px;
                margin-bottom: 15px;
            }
            .decorated-list button {
                font-size: 0.9rem;
                padding: 6px;
            }
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href = 'main.html'">
            BACK TO MAIN MENU
        </button>
        <h1 id="h99">Enter your nickname or choose from the list</h1>
        <div class="input-group">
            <textarea type="text" id="nickname-input" placeholder="Enter here" maxlength="18"></textarea>
            <p id="nicknameCounter" style="font-size:12px; color:white; margin-top:4px;">0/18</p>
            <button id="randomize" class="btn">Random</button>
            <button id="to-decorate" class="btn hidden">Decorate тЖТ</button>
        </div>
        <h4 id="error" style="color: red; display: none;"></h4>
        <div class="examples" id="example-list"></div>
        <div id="decorations" style="display:none; margin-top:30px;">
            <h2>Choose a decoration</h2>
            <div class="decorated-list" id="decorated-list"></div>
        </div>
        <div id="final-section" style="display:none;">

                <button id="send-final" class="btn">Share</button>
            </div>
            <div id="message"></div>
        </div>
    </div>
